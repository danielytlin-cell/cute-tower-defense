<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .label { font: 700 18px Trebuchet MS, Arial, sans-serif; fill: #26352b; }
      .small { font: 700 14px Trebuchet MS, Arial, sans-serif; fill: #26352b; }
      .tiny { font: 700 12px Trebuchet MS, Arial, sans-serif; fill: #26352b; }
      .path-outline { fill: none; stroke: #8f653e; stroke-width: 88; stroke-linecap: round; stroke-linejoin: round; }
      .path-fill { fill: none; stroke: #d9a35f; stroke-width: 70; stroke-linecap: round; stroke-linejoin: round; }
      .path-dash { fill: none; stroke: rgba(255,255,230,.55); stroke-width: 5; stroke-dasharray: 16 22; stroke-linecap: round; stroke-linejoin: round; }
      .range { opacity: .18; stroke-width: 3; }
      .spot { fill: #fff7ad; stroke: #8b7242; stroke-width: 4; }
      .tower { stroke: #314030; stroke-width: 4; }
      .callout { fill: #fff9df; stroke: #d9b35d; stroke-width: 3; }
      .arrow { stroke: #314030; stroke-width: 4; marker-end: url(#arrow); fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#314030"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="#a8dd71"/>
  <path d="M0 0 H1280 V135 C980 210 720 55 490 155 C285 245 120 105 0 185 Z" fill="#76d8e7"/>
  <path d="M0 0 H1280 V135 C980 210 720 55 490 155 C285 245 120 105 0 185 Z" fill="none" stroke="#e9ffff" stroke-width="5" opacity=".7"/>

  <polyline class="path-outline" points="-50,575 150,535 230,375 390,410 500,250 670,265 780,430 940,430 1045,575 1330,510"/>
  <polyline class="path-fill" points="-50,575 150,535 230,375 390,410 500,250 670,265 780,430 940,430 1045,575 1330,510"/>
  <polyline class="path-dash" points="-50,575 150,535 230,375 390,410 500,250 670,265 780,430 940,430 1045,575 1330,510"/>

  <text x="40" y="52" class="label">Stage 5 Strategy Layout</text>
  <text x="40" y="78" class="small">Goal: hold flyers early, then slow and splash the ground wave at the left-center choke.</text>

  <!-- Useful build spots -->
  <circle class="spot" cx="122" cy="426" r="22"/><text x="116" y="432" class="tiny">0</text>
  <circle class="spot" cx="232" cy="612" r="22"/><text x="226" y="618" class="tiny">1</text>
  <circle class="spot" cx="315" cy="310" r="22"/><text x="309" y="316" class="tiny">2</text>
  <circle class="spot" cx="420" cy="505" r="22"/><text x="414" y="511" class="tiny">3</text>
  <circle class="spot" cx="520" cy="150" r="22"/><text x="514" y="156" class="tiny">4</text>
  <circle class="spot" cx="625" cy="365" r="22"/><text x="619" y="371" class="tiny">5</text>
  <circle class="spot" cx="746" cy="246" r="22"/><text x="740" y="252" class="tiny">6</text>
  <circle class="spot" cx="855" cy="520" r="22"/><text x="849" y="526" class="tiny">7</text>
  <circle class="spot" cx="950" cy="325" r="22"/><text x="944" y="331" class="tiny">8</text>
  <circle class="spot" cx="1080" cy="465" r="22"/><text x="1074" y="471" class="tiny">9</text>
  <circle class="spot" cx="1140" cy="635" r="22"/><text x="1130" y="641" class="tiny">10</text>
  <circle class="spot" cx="739" cy="534" r="22"/><text x="729" y="540" class="tiny">11</text>

  <!-- Opening towers and ranges -->
  <circle class="range" cx="625" cy="365" r="160" fill="#d7b2ff" stroke="#7f49be"/>
  <circle class="tower" cx="625" cy="365" r="31" fill="#d7b2ff"/><text x="609" y="371" class="label">1</text>
  <text x="548" y="323" class="small">Lightning</text>

  <circle class="range" cx="950" cy="325" r="160" fill="#d7b2ff" stroke="#7f49be"/>
  <circle class="tower" cx="950" cy="325" r="31" fill="#d7b2ff"/><text x="934" y="331" class="label">2</text>
  <text x="884" y="284" class="small">Lightning</text>

  <circle class="range" cx="746" cy="246" r="150" fill="#9bd85e" stroke="#3d8d38"/>
  <circle class="tower" cx="746" cy="246" r="29" fill="#9bd85e"/><text x="731" y="252" class="label">3</text>
  <text x="690" y="204" class="small">Archer</text>

  <!-- Wave 1 purchases -->
  <circle class="range" cx="420" cy="505" r="126" fill="#8ee9f2" stroke="#218a9b"/>
  <circle class="tower" cx="420" cy="505" r="29" fill="#8ee9f2"/><text x="405" y="511" class="label">4</text>
  <text x="360" y="560" class="small">Frost</text>

  <circle class="range" cx="315" cy="310" r="132" fill="#f2a24a" stroke="#a55d1e"/>
  <circle class="tower" cx="315" cy="310" r="29" fill="#f2a24a"/><text x="300" y="316" class="label">5</text>
  <text x="246" y="265" class="small">Cannon</text>

  <!-- Later towers -->
  <circle class="tower" cx="855" cy="520" r="29" fill="#ff826f"/><text x="840" y="526" class="label">6</text>
  <text x="794" y="575" class="small">Fire</text>

  <circle class="tower" cx="1080" cy="465" r="30" fill="#79d6ff"/><text x="1065" y="471" class="label">7</text>
  <text x="1016" y="420" class="small">Crystal</text>

  <rect class="callout" x="40" y="105" width="360" height="178" rx="8"/>
  <text x="62" y="138" class="label">Build Order</text>
  <text x="62" y="166" class="small">1. Lightning at spot 5</text>
  <text x="62" y="190" class="small">2. Lightning at spot 8</text>
  <text x="62" y="214" class="small">3. Archer at spot 6</text>
  <text x="62" y="238" class="small">4. Buy Frost at spot 3 during Wave 1</text>
  <text x="62" y="262" class="small">5. Buy Cannon at spot 2 before Wave 2</text>

  <rect class="callout" x="890" y="88" width="342" height="132" rx="8"/>
  <text x="912" y="121" class="label">Upgrade Priority</text>
  <text x="912" y="150" class="small">A. Upgrade first Lightning</text>
  <text x="912" y="174" class="small">B. Add Fire at spot 7</text>
  <text x="912" y="198" class="small">C. Add Crystal at spot 9 for boss</text>

  <path class="arrow" d="M402 247 C475 235 545 280 594 341"/>
  <path class="arrow" d="M888 222 C878 260 902 292 925 308"/>
  <path class="arrow" d="M445 472 C410 440 365 390 332 335"/>
</svg>
